<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-style.css">
</head>

<body class="admin-login-body"
    style="background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80&w=1920') center/cover;">
    <div
        style="position: absolute; inset:0; background: linear-gradient(135deg, rgba(37, 99, 235, 0.9) 0%, rgba(15, 23, 42, 0.85) 100%);">
    </div>
    <div class="login-container glass-panel" style="position: relative; z-index: 10;">
        <div class="logo mb-4" style="font-size: 2rem; color: var(--primary);"><i class="fa-solid fa-user-shield"></i>
            Admin Panel</div>
        <h2 style="color:var(--text-dark);">System Authentication</h2>
        <form id="admin-login-form">
            <div class="input-group">
                <label>Administrator Email</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" required placeholder="sandhya@admin.com" value="sandhya@admin.com">
                </div>
            </div>
            <div class="input-group">
                <label>Secure Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" required placeholder="1234" value="1234">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg mt-4 shadow-hover">Access Control Panel</button>
        </form>
        <p id="error-msg" class="error"></p>
    </div>

    <footer id="school-footer">
        © 2026 Sandhya Kamble. All Rights Reserved.
    </footer>

    <script src="js/admin-app.js"></script>
</body>

</html>
